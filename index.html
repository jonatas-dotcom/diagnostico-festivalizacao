<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Festivalização | NESTY'</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8580A;
    --orange-dark: #c94a08;
    --orange-light: #FFF4EF;
    --black: #0D0D0D;
    --gray-900: #1A1A1A;
    --gray-800: #2A2A2A;
    --gray-600: #555;
    --gray-400: #999;
    --gray-200: #E8E8E8;
    --gray-100: #F5F5F3;
    --white: #FFFFFF;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse 80% 60% at 20% -10%, rgba(232,88,10,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(232,88,10,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 0 1.5rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 2.5rem 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.02em;
  }

  .brand-name span {
    color: var(--orange);
  }

  .brand-divider {
    width: 1px;
    height: 16px;
    background: var(--gray-600);
  }

  .brand-sub {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  /* Progress */
  .progress-wrap {
    margin-top: 3rem;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .progress-count {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--orange);
    font-weight: 600;
  }

  .progress-track {
    height: 2px;
    background: var(--gray-800);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--orange);
    border-radius: 2px;
    transition: width .5s cubic-bezier(.4,0,.2,1);
  }

  /* Dimension badge */
  .dim-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 2.5rem;
    padding: 5px 12px;
    border: 1px solid rgba(232,88,10,.3);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    color: var(--orange);
    letter-spacing: .06em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp .4s .1s forwards;
  }

  .dim-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }

  /* Question */
  .question-wrap {
    margin-top: 1.25rem;
    opacity: 0;
    animation: fadeUp .4s .2s forwards;
  }

  .question-text {
    font-family: var(--font-display);
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    line-height: 1.25;
    color: var(--white);
    letter-spacing: -.02em;
  }

  /* Options */
  .options {
    margin-top: 2rem;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    animation: fadeUp .4s .3s forwards;
  }

  .opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border: 1px solid var(--gray-800);
    border-radius: 12px;
    cursor: pointer;
    background: rgba(255,255,255,.02);
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .opt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--orange);
    opacity: 0;
    transition: opacity .2s;
  }

  .opt:hover {
    border-color: rgba(232,88,10,.4);
    background: rgba(232,88,10,.05);
  }

  .opt.selected {
    border-color: var(--orange);
    background: rgba(232,88,10,.08);
  }

  .opt-num {
    position: relative;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--gray-700);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-400);
    flex-shrink: 0;
    transition: all .2s;
  }

  .opt.selected .opt-num {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
  }

  .opt-text {
    position: relative;
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.4;
    transition: color .2s;
  }

  .opt.selected .opt-text {
    color: var(--white);
  }

  .opt:hover .opt-text {
    color: rgba(255,255,255,.8);
  }

  /* Nav */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2.5rem;
    padding-bottom: 3rem;
    opacity: 0;
    animation: fadeUp .4s .4s forwards;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--gray-700);
    background: transparent;
    color: var(--gray-400);
    transition: all .2s;
  }

  .btn:hover:not(:disabled) {
    border-color: var(--gray-500);
    color: var(--white);
  }

  .btn:disabled {
    opacity: .25;
    cursor: not-allowed;
  }

  .btn-primary {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
    font-weight: 600;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--orange-dark);
    border-color: var(--orange-dark);
  }

  .btn-primary:disabled {
    background: var(--gray-800);
    border-color: var(--gray-800);
    color: var(--gray-600);
    opacity: 1;
  }

  /* Result */
  .result-wrap {
    opacity: 0;
    animation: fadeUp .5s .1s forwards;
    padding-bottom: 4rem;
  }

  .result-hero {
    margin-top: 3rem;
    text-align: center;
    padding: 3rem 2rem;
    border: 1px solid var(--gray-800);
    border-radius: 20px;
    background: rgba(255,255,255,.02);
    position: relative;
    overflow: hidden;
  }

  .result-hero::before {
    content: '';
    position: absolute;
    top: -40%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(232,88,10,.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .result-eyebrow {
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .result-score {
    font-family: var(--font-display);
    font-size: clamp(72px, 15vw, 96px);
    font-weight: 800;
    color: var(--white);
    line-height: 1;
    letter-spacing: -.04em;
  }

  .result-score span {
    font-size: .45em;
    color: var(--orange);
    vertical-align: super;
  }

  .result-badge {
    display: inline-block;
    margin-top: 1rem;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .badge-iniciante { background: rgba(220,38,38,.15); color: #FCA5A5; border: 1px solid rgba(220,38,38,.3); }
  .badge-desenvolvimento { background: rgba(234,179,8,.12); color: #FCD34D; border: 1px solid rgba(234,179,8,.3); }
  .badge-avancado { background: rgba(16,185,129,.12); color: #6EE7B7; border: 1px solid rgba(16,185,129,.3); }
  .badge-festivalizador { background: rgba(232,88,10,.15); color: var(--orange); border: 1px solid rgba(232,88,10,.4); }

  /* Radar */
  .radar-section {
    margin-top: 2rem;
    padding: 2rem;
    border: 1px solid var(--gray-800);
    border-radius: 16px;
    background: rgba(255,255,255,.02);
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .radar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  /* Dimension bars */
  .dim-bars {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .dim-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dim-name {
    font-size: 13px;
    color: var(--gray-400);
    width: 120px;
    flex-shrink: 0;
  }

  .dim-track {
    flex: 1;
    height: 4px;
    background: var(--gray-800);
    border-radius: 4px;
    overflow: hidden;
  }

  .dim-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1.2s cubic-bezier(.4,0,.2,1);
  }

  .dim-pct {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    width: 36px;
    text-align: right;
  }

  /* Insight */
  .insight-section {
    margin-top: 1.5rem;
    padding: 1.75rem 2rem;
    border-radius: 16px;
    border-left: 3px solid var(--orange);
    background: rgba(232,88,10,.06);
    border-top: 1px solid rgba(232,88,10,.2);
    border-right: 1px solid rgba(232,88,10,.1);
    border-bottom: 1px solid rgba(232,88,10,.1);
  }

  .insight-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: .75rem;
  }

  .insight-text {
    font-size: 14px;
    color: var(--gray-400);
    line-height: 1.7;
  }

  /* Gaps */
  .gaps-section {
    margin-top: 1.5rem;
  }

  .gap-item {
    padding: 1.25rem 1.5rem;
    border: 1px solid var(--gray-800);
    border-radius: 12px;
    margin-bottom: 10px;
    background: rgba(255,255,255,.02);
    transition: border-color .2s;
  }

  .gap-item:hover {
    border-color: var(--gray-600);
  }

  .gap-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: .5rem;
  }

  .gap-dim {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
  }

  .gap-score {
    font-size: 12px;
    color: var(--gray-600);
    padding: 2px 8px;
    background: var(--gray-800);
    border-radius: 10px;
  }

  .gap-text {
    font-size: 13px;
    color: var(--gray-400);
    line-height: 1.6;
  }

  /* Footer */
  .result-footer {
    margin-top: 2.5rem;
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid var(--gray-800);
  }

  .result-footer p {
    font-size: 12px;
    color: var(--gray-600);
    line-height: 1.7;
  }

  .result-footer strong {
    color: var(--gray-400);
  }

  .restart-btn {
    margin-top: 1.5rem;
    display: inline-block;
    font-family: var(--font-body);
    font-size: 13px;
    padding: 10px 22px;
    border: 1px solid var(--gray-700);
    border-radius: 8px;
    color: var(--gray-400);
    cursor: pointer;
    background: transparent;
    transition: all .2s;
  }

  .restart-btn:hover {
    border-color: var(--gray-500);
    color: var(--white);
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fade-enter {
    animation: fadeUp .35s ease forwards;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .brand-sub, .brand-divider { display: none; }
    .opt { padding: 14px 16px; }
    .result-hero { padding: 2rem 1.5rem; }
    .dim-name { width: 90px; font-size: 12px; }
    .radar-section { padding: 1.5rem; }
    .insight-section { padding: 1.25rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">
      <div class="brand-name">nesty<span>'</span></div>
      <div class="brand-divider"></div>
      <div class="brand-sub">Eventos Associativos</div>
    </div>
  </header>

  <div id="app"></div>
</div>

<script>
const DIMS = [
  { id: 'conteudo',        label: 'Conteúdo',        color: '#E8580A' },
  { id: 'entretenimento',  label: 'Entretenimento',  color: '#1D9E75' },
  { id: 'negocios',        label: 'Negócios',        color: '#378ADD' },
  { id: 'networking',      label: 'Networking',      color: '#7F77DD' },
  { id: 'comunidade',      label: 'Comunidade',      color: '#D85A30' },
];

const QUESTIONS = [
  { dim: 'conteudo', text: 'Como você descreveria a curadoria de conteúdo do seu evento?', opts: [
    { t: 'Conteúdo genérico, sem curador definido', v: 1 },
    { t: 'Programação organizada, mas sem diferenciação clara', v: 2 },
    { t: 'Curadoria intencional com especialistas reconhecidos', v: 3 },
    { t: 'Curadoria de alto nível, referência na área', v: 4 },
  ]},
  { dim: 'conteudo', text: 'Os formatos de apresentação de conteúdo do seu evento são…', opts: [
    { t: 'Apenas palestras tradicionais', v: 1 },
    { t: 'Palestras e alguns painéis de debate', v: 2 },
    { t: 'Variedade de formatos: workshops, painéis, talks', v: 3 },
    { t: 'Formatos inovadores, imersivos e interativos', v: 4 },
  ]},
  { dim: 'entretenimento', text: 'Qual é o papel do entretenimento no seu evento?', opts: [
    { t: 'Não há entretenimento', v: 1 },
    { t: 'Um jantar ou confraternização pontual', v: 2 },
    { t: 'Momentos de entretenimento integrados à programação', v: 3 },
    { t: 'Entretenimento como pilar estratégico da experiência', v: 4 },
  ]},
  { dim: 'entretenimento', text: 'Os participantes costumam criar e compartilhar memórias afetivas do seu evento?', opts: [
    { t: 'Raramente — o evento não gera esse tipo de lembrança', v: 1 },
    { t: 'Algumas vezes, de forma espontânea', v: 2 },
    { t: 'Com frequência, o evento tem momentos memoráveis', v: 3 },
    { t: 'Sempre — reconhecido pela experiência emocional', v: 4 },
  ]},
  { dim: 'negocios', text: 'Qual é a intensidade das oportunidades de negócio no seu evento?', opts: [
    { t: 'Nenhuma área comercial ou exposição', v: 1 },
    { t: 'Pequena área de patrocinadores', v: 2 },
    { t: 'Exposição estruturada com estandes e rodadas', v: 3 },
    { t: 'Ecossistema robusto de negócios integrado ao evento', v: 4 },
  ]},
  { dim: 'negocios', text: 'Seu evento atrai patrocínios de setores além do tradicional da área?', opts: [
    { t: 'Não — apenas os patrocinadores habituais do setor', v: 1 },
    { t: 'Raramente, com esforço pontual', v: 2 },
    { t: 'Sim, há diversificação crescente de setores', v: 3 },
    { t: 'Sim, o evento é plataforma para múltiplos setores', v: 4 },
  ]},
  { dim: 'networking', text: 'Como o networking acontece no seu evento?', opts: [
    { t: 'De forma espontânea, sem estrutura', v: 1 },
    { t: 'Há coffee breaks e momentos livres', v: 2 },
    { t: 'Espaços e formatos pensados para conexões', v: 3 },
    { t: 'Ferramentas de matchmaking e networking intencional', v: 4 },
  ]},
  { dim: 'networking', text: 'Os participantes saem do evento com conexões novas e relevantes?', opts: [
    { t: 'Raramente — networking não é um resultado claro', v: 1 },
    { t: 'Às vezes, dependendo do participante', v: 2 },
    { t: 'Com frequência, é um valor reconhecido do evento', v: 3 },
    { t: 'Sempre — o networking é a principal razão de participação', v: 4 },
  ]},
  { dim: 'comunidade', text: 'O seu evento tem vida além da data presencial?', opts: [
    { t: 'Não — começa e termina no evento', v: 1 },
    { t: 'Há alguma comunicação pós-evento', v: 2 },
    { t: 'Comunidade ativa entre edições', v: 3 },
    { t: 'O evento é ponto alto de uma comunidade permanente', v: 4 },
  ]},
  { dim: 'comunidade', text: 'Como a fidelidade dos participantes evolui entre edições?', opts: [
    { t: 'Alta rotatividade, pouca retenção', v: 1 },
    { t: 'Retorno moderado com engajamento irregular', v: 2 },
    { t: 'Base fiel crescente a cada edição', v: 3 },
    { t: 'Comunidade apaixonada que antecipa e divulga o evento', v: 4 },
  ]},
];

let current = 0;
const answers = new Array(QUESTIONS.length).fill(null);

function dimScore(id) {
  const vals = [];
  QUESTIONS.forEach((q, i) => {
    if (q.dim === id && answers[i] !== null) vals.push(q.opts[answers[i]].v);
  });
  if (!vals.length) return 0;
  return Math.round((vals.reduce((a, b) => a + b, 0) / vals.length / 4) * 100);
}

function totalScore() {
  return Math.round(DIMS.reduce((s, d) => s + dimScore(d.id), 0) / DIMS.length);
}

function badgeInfo(score) {
  if (score < 40) return { label: 'Iniciante', cls: 'badge-iniciante' };
  if (score < 60) return { label: 'Em Desenvolvimento', cls: 'badge-desenvolvimento' };
  if (score < 80) return { label: 'Avançado', cls: 'badge-avancado' };
  return { label: 'Festivalizador', cls: 'badge-festivalizador' };
}

function insightText(score) {
  if (score < 40) return 'Seu evento ainda opera dentro de uma lógica tradicional de um único tipo MICE. Há muito espaço para incorporar novas dimensões — pequenas mudanças intencionais já criam impacto significativo na experiência e no engajamento dos participantes.';
  if (score < 60) return 'Você tem boas bases, mas as dimensões ainda funcionam de forma isolada. O próximo passo é tornar a integração intencional: cada elemento do evento deve conversar com os outros para criar uma experiência coesa e memorável.';
  if (score < 80) return 'Seu evento já combina múltiplas dimensões com consistência. O desafio agora é a profundidade: transformar momentos bons em momentos inesquecíveis e converter participantes em membros de uma comunidade fiel.';
  return 'Você opera no mais alto nível da equação MICE² = F. Seu evento é uma plataforma de experiência completa. O foco agora é manter a evolução contínua e não deixar que o sucesso passado engesse a inovação.';
}

function gapText(id) {
  return {
    conteudo: 'Invista em curadoria mais intencional e diversifique os formatos de apresentação. Conteúdo diferenciado é o principal motivo de retorno entre edições.',
    entretenimento: 'Integre entretenimento à programação — não como complemento, mas como parte da experiência. Momentos memoráveis constroem comunidades fiéis.',
    negocios: 'Estruture melhor as oportunidades comerciais e diversifique os setores de patrocínio. Negócios sustentáveis garantem a longevidade do evento.',
    networking: 'Crie espaços e ferramentas pensados para conexões intencionais. Networking de qualidade é frequentemente o principal motivo de participação.',
    comunidade: 'Construa presença além da data presencial. Uma comunidade ativa entre edições reduz o custo de aquisição e amplia o impacto do evento.',
  }[id] || '';
}

function buildRadar() {
  const size = 200;
  const cx = size / 2, cy = size / 2, r = 72;
  const n = DIMS.length;
  const angles = DIMS.map((_, i) => (i / n) * 2 * Math.PI - Math.PI / 2);

  function poly(factors) {
    return angles.map((a, i) => {
      const f = (factors[i] || 0) / 100;
      return `${(cx + r * f * Math.cos(a)).toFixed(1)},${(cy + r * f * Math.sin(a)).toFixed(1)}`;
    }).join(' ');
  }

  const grids = [1, 0.75, 0.5, 0.25].map(f =>
    `<polygon points="${poly(DIMS.map(() => f * 100))}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`
  ).join('');

  const axes = angles.map((a) =>
    `<line x1="${cx}" y1="${cy}" x2="${(cx + r * Math.cos(a)).toFixed(1)}" y2="${(cy + r * Math.sin(a)).toFixed(1)}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>`
  ).join('');

  const scorePts = DIMS.map(d => dimScore(d.id));
  const dataPolygon = `<polygon points="${poly(scorePts)}" fill="rgba(232,88,10,0.2)" stroke="#E8580A" stroke-width="1.5"/>`;
  const dots = angles.map((a, i) => {
    const f = scorePts[i] / 100;
    return `<circle cx="${(cx + r * f * Math.cos(a)).toFixed(1)}" cy="${(cy + r * f * Math.sin(a)).toFixed(1)}" r="3.5" fill="#E8580A"/>`;
  }).join('');

  const labels = DIMS.map((d, i) => {
    const a = angles[i];
    const lx = (cx + (r + 20) * Math.cos(a)).toFixed(1);
    const ly = (cy + (r + 20) * Math.sin(a)).toFixed(1);
    const anchor = Math.cos(angles[i]) > 0.2 ? 'start' : Math.cos(angles[i]) < -0.2 ? 'end' : 'middle';
    return `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="9.5" fill="rgba(255,255,255,0.45)" font-family="Inter,sans-serif">${d.label}</text>`;
  }).join('');

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="Radar de festivalização">
    ${grids}${axes}${dataPolygon}${dots}${labels}
  </svg>`;
}

function render() {
  const app = document.getElementById('app');

  if (current < QUESTIONS.length) {
    const q = QUESTIONS[current];
    const dim = DIMS.find(d => d.id === q.dim);
    const pct = Math.round((current / QUESTIONS.length) * 100);
    const hasAnswer = answers[current] !== null;

    app.innerHTML = `
      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="progress-label">Progresso</span>
          <span class="progress-count">${current + 1} / ${QUESTIONS.length}</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="dim-badge fade-enter">
        <div class="dim-dot"></div>
        ${dim.label}
      </div>

      <div class="question-wrap fade-enter">
        <div class="question-text">${q.text}</div>
      </div>

      <div class="options fade-enter">
        ${q.opts.map((o, i) => `
          <div class="opt${answers[current] === i ? ' selected' : ''}" data-i="${i}">
            <div class="opt-num">${i + 1}</div>
            <div class="opt-text">${o.t}</div>
          </div>
        `).join('')}
      </div>

      <div class="nav fade-enter">
        <button class="btn" id="btn-prev" ${current === 0 ? 'disabled' : ''}>← Anterior</button>
        <button class="btn btn-primary" id="btn-next" ${!hasAnswer ? 'disabled' : ''}>
          ${current === QUESTIONS.length - 1 ? 'Ver resultado →' : 'Próxima →'}
        </button>
      </div>
    `;

    document.querySelectorAll('.opt').forEach(el => {
      el.addEventListener('click', () => {
        answers[current] = parseInt(el.dataset.i);
        render();
      });
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (current > 0) { current--; render(); }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      if (answers[current] === null) return;
      if (current < QUESTIONS.length - 1) { current++; render(); }
      else showResult();
    });

  }
}

function showResult() {
  const app = document.getElementById('app');
  const total = totalScore();
  const b = badgeInfo(total);

  const sorted = [...DIMS].map(d => ({ ...d, score: dimScore(d.id) })).sort((a, b) => a.score - b.score);
  const topGaps = sorted.slice(0, 2);

  app.innerHTML = `
    <div class="result-wrap">
      <div class="result-hero">
        <div class="result-eyebrow">Índice de Festivalização</div>
        <div class="result-score">${total}<span>%</span></div>
        <div class="result-badge ${b.cls}">${b.label}</div>
      </div>

      <div class="radar-section" style="margin-top:1.5rem">
        <div class="section-title">Radar por dimensão</div>
        <div class="radar-wrap">${buildRadar()}</div>
        <div class="dim-bars">
          ${DIMS.map(d => `
            <div class="dim-row">
              <div class="dim-name">${d.label}</div>
              <div class="dim-track">
                <div class="dim-fill" style="width:${dimScore(d.id)}%;background:${d.color}"></div>
              </div>
              <div class="dim-pct">${dimScore(d.id)}%</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="insight-section">
        <div class="insight-title">O que isso significa para o seu evento</div>
        <div class="insight-text">${insightText(total)}</div>
      </div>

      <div class="gaps-section">
        <div class="section-title" style="margin-bottom:1rem">Onde focar primeiro</div>
        ${topGaps.map(g => `
          <div class="gap-item">
            <div class="gap-header">
              <div class="gap-dim">${g.label}</div>
              <div class="gap-score">${g.score}%</div>
            </div>
            <div class="gap-text">${gapText(g.id)}</div>
          </div>
        `).join('')}
      </div>

      <div class="result-footer">
        <p>Baseado no conceito <strong>MICE² = F</strong> de <strong>Rodrigo Cordeiro</strong><br>
        NESTY' Congressos & Feiras de Negócios · Plataforma Eventos Associativos</p>
        <button class="restart-btn" onclick="restartQuiz()">Refazer diagnóstico</button>
      </div>
    </div>
  `;
}

function restartQuiz() {
  current = 0;
  answers.fill(null);
  render();
}

render();
</script>
</body>
</html>
